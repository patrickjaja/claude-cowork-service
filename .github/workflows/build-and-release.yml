name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      do_release: ${{ steps.version.outputs.do_release }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            LATEST=$(git tag --list 'v*' --sort=-v:refname | head -1)
            if [ -z "$LATEST" ]; then
              LATEST="v0.0.0"
            fi
            MAJOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f1)
            MINOR=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f2)
            PATCH=$(echo "$LATEST" | sed 's/^v//' | cut -d. -f3)

            case "${{ inputs.bump }}" in
              major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
              minor) MINOR=$((MINOR+1)); PATCH=0 ;;
              patch) PATCH=$((PATCH+1)) ;;
            esac

            echo "version=v${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
            echo "do_release=true" >> $GITHUB_OUTPUT
            echo "Next version: v${MAJOR}.${MINOR}.${PATCH} (was $LATEST, bump: ${{ inputs.bump }})"

          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
            echo "do_release=true" >> $GITHUB_OUTPUT
            echo "Tag-triggered release: ${{ github.ref_name }}"

          else
            echo "version=" >> $GITHUB_OUTPUT
            echo "do_release=false" >> $GITHUB_OUTPUT
            echo "No release (branch push or PR)"
          fi

  build:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Vet
        run: go vet ./...

      - name: Build
        run: make

      - name: Build with makepkg LDFLAGS
        run: |
          make clean
          LDFLAGS="-Wl,-O1,--sort-common,--as-needed,-z,relro,-z,now" make build

      - name: Cross-compile ARM64
        run: make build-arm64

      - name: Test
        run: go test ./...

      - name: Install Nix
        uses: cachix/install-nix-action@v27
      - name: Build with Nix
        run: |
          # Build using local source instead of fetchFromGitHub.
          # The flake's package.nix uses fetchFromGitHub for end users;
          # in CI we override src to the flake's own git-tracked source tree.
          nix build --no-link --print-build-logs --impure --expr '
            let flake = builtins.getFlake (toString ./.);
            in flake.packages.x86_64-linux.claude-cowork-service.overrideAttrs {
              src = flake.outPath;
            }
          '
      - name: Test NixOS module evaluation
        run: |
          # Override package src so the module test builds from local source,
          # not the (potentially stale) fetchFromGitHub tag.
          nix build --no-link --print-build-logs --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
              pkgs = flake.inputs.nixpkgs.legacyPackages.x86_64-linux;
              localPkg = flake.packages.x86_64-linux.claude-cowork-service.overrideAttrs {
                src = flake.outPath;
              };
            in pkgs.callPackage ./packaging/nix/module-test.nix {
              nixpkgs = flake.inputs.nixpkgs;
              self = flake;
              packageOverride = localPkg;
            }
          '

  release:
    needs: [prepare, build]
    if: needs.prepare.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: false

      - name: Update CHANGELOG and create tag (workflow_dispatch only)
        if: github.event_name == 'workflow_dispatch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          VERSION="${RELEASE_VERSION#v}"
          DATE=$(date +%Y-%m-%d)

          # Replace "## Unreleased" with versioned heading, add new empty Unreleased section
          if grep -q '^## Unreleased' CHANGELOG.md; then
            awk -v ver="## ${VERSION} — ${DATE}" '
              /^## Unreleased/ { print "## Unreleased"; print ""; print ver; next }
              { print }
            ' CHANGELOG.md > CHANGELOG.tmp && mv CHANGELOG.tmp CHANGELOG.md
            git add CHANGELOG.md
            git commit -m "Release ${RELEASE_VERSION}: update CHANGELOG"
            git push origin main
          fi

          # Tag the commit that includes the CHANGELOG update
          git tag -a "${RELEASE_VERSION}" -m "Release ${RELEASE_VERSION}"
          git push origin "${RELEASE_VERSION}"

      - name: Set up QEMU for ARM64 testing
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build release binary (x86_64)
        run: make VERSION=${RELEASE_VERSION#v}

      - name: Build release binary (ARM64)
        run: make build-arm64 VERSION=${RELEASE_VERSION#v}

      - name: Generate checksums
        run: |
          sha256sum cowork-svc-linux > cowork-svc-linux.sha256
          sha256sum cowork-svc-linux-arm64 > cowork-svc-linux-arm64.sha256

      - name: Build Debian package (amd64)
        id: deb
        run: |
          VERSION="${RELEASE_VERSION#v}"
          sudo apt-get install -y dpkg-dev
          bash packaging/debian/build-deb.sh cowork-svc-linux "$VERSION" amd64
          DEB_FILE="claude-cowork-service_${VERSION}_amd64.deb"
          sha256sum "$DEB_FILE" > "${DEB_FILE}.sha256"
          echo "deb_file=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "deb_sha256=$(cut -d' ' -f1 "${DEB_FILE}.sha256")" >> $GITHUB_OUTPUT

      - name: Build Debian package (arm64)
        id: deb_arm64
        run: |
          VERSION="${RELEASE_VERSION#v}"
          bash packaging/debian/build-deb.sh cowork-svc-linux-arm64 "$VERSION" arm64
          DEB_FILE="claude-cowork-service_${VERSION}_arm64.deb"
          sha256sum "$DEB_FILE" > "${DEB_FILE}.sha256"
          echo "deb_file=$DEB_FILE" >> $GITHUB_OUTPUT
          echo "deb_sha256=$(cut -d' ' -f1 "${DEB_FILE}.sha256")" >> $GITHUB_OUTPUT

      - name: Build RPM package (x86_64)
        id: rpm
        run: |
          VERSION="${RELEASE_VERSION#v}"
          mkdir -p rpm-out
          docker run --rm \
            -v "$(pwd):/build:ro" \
            -v "$(pwd)/rpm-out:/output" \
            fedora:40 \
            bash -c "
              set -euo pipefail
              dnf install -y rpm-build
              cp /build/cowork-svc-linux /tmp/
              cd /output
              bash /build/packaging/rpm/build-rpm.sh /tmp/cowork-svc-linux $VERSION x86_64
            "
          sudo chown -R $(id -u):$(id -g) rpm-out
          RPM_FILE=$(ls rpm-out/claude-cowork-service-*x86_64.rpm)
          sha256sum "$RPM_FILE" > "${RPM_FILE}.sha256"
          # Create a stable-named copy for predictable download URLs
          cp "$RPM_FILE" "rpm-out/claude-cowork-service-latest.x86_64.rpm"
          sha256sum "rpm-out/claude-cowork-service-latest.x86_64.rpm" > "rpm-out/claude-cowork-service-latest.x86_64.rpm.sha256"
          echo "rpm_file=$RPM_FILE" >> $GITHUB_OUTPUT
          echo "rpm_stable=rpm-out/claude-cowork-service-latest.x86_64.rpm" >> $GITHUB_OUTPUT
          echo "rpm_sha256=$(cut -d' ' -f1 "${RPM_FILE}.sha256")" >> $GITHUB_OUTPUT

      - name: Build RPM package (aarch64)
        id: rpm_arm64
        run: |
          VERSION="${RELEASE_VERSION#v}"
          mkdir -p rpm-out-arm64
          docker run --rm \
            -v "$(pwd):/build:ro" \
            -v "$(pwd)/rpm-out-arm64:/output" \
            fedora:40 \
            bash -c "
              set -euo pipefail
              dnf install -y rpm-build
              cp /build/cowork-svc-linux-arm64 /tmp/cowork-svc-linux
              cd /output
              bash /build/packaging/rpm/build-rpm.sh /tmp/cowork-svc-linux $VERSION aarch64
            "
          sudo chown -R $(id -u):$(id -g) rpm-out-arm64
          RPM_FILE=$(ls rpm-out-arm64/claude-cowork-service-*aarch64.rpm)
          sha256sum "$RPM_FILE" > "${RPM_FILE}.sha256"
          # Create a stable-named copy for predictable download URLs
          cp "$RPM_FILE" "rpm-out-arm64/claude-cowork-service-latest.aarch64.rpm"
          sha256sum "rpm-out-arm64/claude-cowork-service-latest.aarch64.rpm" > "rpm-out-arm64/claude-cowork-service-latest.aarch64.rpm.sha256"
          echo "rpm_file=$RPM_FILE" >> $GITHUB_OUTPUT
          echo "rpm_stable=rpm-out-arm64/claude-cowork-service-latest.aarch64.rpm" >> $GITHUB_OUTPUT
          echo "rpm_sha256=$(cut -d' ' -f1 "${RPM_FILE}.sha256")" >> $GITHUB_OUTPUT

      - name: Test RPM package (x86_64)
        run: |
          docker run --rm \
            -v "$(pwd)/${{ steps.rpm.outputs.rpm_file }}:/dist/test.rpm:ro" \
            fedora:40 \
            bash -c "
              set -e
              dnf install -y /dist/test.rpm
              cowork-svc-linux -version
              test -f /usr/lib/systemd/user/claude-cowork.service
              echo 'RPM x86_64 test passed'
            "

      - name: Test RPM package (aarch64)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$(pwd)/${{ steps.rpm_arm64.outputs.rpm_file }}:/dist/test.rpm:ro" \
            arm64v8/fedora:40 \
            bash -c "
              set -e
              dnf install -y /dist/test.rpm
              cowork-svc-linux -version
              test -f /usr/lib/systemd/user/claude-cowork.service
              echo 'RPM aarch64 test passed'
            "

      - name: Test Debian package (arm64)
        run: |
          docker run --rm --platform linux/arm64 \
            -v "$(pwd):/dist:ro" \
            arm64v8/ubuntu:22.04 \
            bash -c "
              set -e
              apt-get update
              apt-get install -y /dist/claude-cowork-service_*_arm64.deb
              cowork-svc-linux -version
              test -f /usr/lib/systemd/user/claude-cowork.service
              echo 'DEB arm64 test passed'
            "

      - name: Extract changelog
        id: changelog
        run: |
          VERSION="${RELEASE_VERSION#v}"
          # Extract section matching this version (everything between this header and the next)
          CONTENT=$(awk "/^## ${VERSION//./\\.}/ { found=1; next } /^## / { if (found) exit } found" CHANGELOG.md)
          # Fallback: extract first section
          if [ -z "$CONTENT" ]; then
            CONTENT=$(awk 'BEGIN{f=0} /^## / { if (f) exit; f=1; next } f' CHANGELOG.md)
          fi
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: ${{ needs.prepare.outputs.version }}
          files: |
            cowork-svc-linux
            cowork-svc-linux.sha256
            cowork-svc-linux-arm64
            cowork-svc-linux-arm64.sha256
            ${{ steps.deb.outputs.deb_file }}
            ${{ steps.deb.outputs.deb_file }}.sha256
            ${{ steps.deb_arm64.outputs.deb_file }}
            ${{ steps.deb_arm64.outputs.deb_file }}.sha256
            ${{ steps.rpm.outputs.rpm_file }}
            ${{ steps.rpm.outputs.rpm_file }}.sha256
            ${{ steps.rpm.outputs.rpm_stable }}
            ${{ steps.rpm.outputs.rpm_stable }}.sha256
            ${{ steps.rpm_arm64.outputs.rpm_file }}
            ${{ steps.rpm_arm64.outputs.rpm_file }}.sha256
            ${{ steps.rpm_arm64.outputs.rpm_stable }}
            ${{ steps.rpm_arm64.outputs.rpm_stable }}.sha256
          body: |
            ${{ steps.changelog.outputs.content }}

            ### Install

            **Debian / Ubuntu (APT):** (x86_64 and ARM64)
            ```
            curl -fsSL https://patrickjaja.github.io/claude-cowork-service/install.sh | sudo bash
            sudo apt install claude-cowork-service
            ```

            **Fedora / RHEL (.rpm):**
            ```bash
            # x86_64
            sudo dnf install https://github.com/patrickjaja/claude-cowork-service/releases/latest/download/claude-cowork-service-latest.x86_64.rpm
            # aarch64
            sudo dnf install https://github.com/patrickjaja/claude-cowork-service/releases/latest/download/claude-cowork-service-latest.aarch64.rpm
            ```

            **NixOS:**
            ```nix
            # In flake.nix inputs:
            claude-cowork-service.url = "github:patrickjaja/claude-cowork-service";
            # Enable: services.claude-cowork.enable = true;
            ```

            **Arch Linux (AUR):** `yay -S claude-cowork-service`

            **Any distro (auto-detects arch):** `curl -fsSL .../scripts/install.sh | bash`

      - name: Upload RPM files for signing
        uses: actions/upload-artifact@v4
        with:
          name: rpm-unsigned
          path: |
            ${{ steps.rpm.outputs.rpm_file }}
            ${{ steps.rpm_arm64.outputs.rpm_file }}
          if-no-files-found: warn
          retention-days: 1

      - name: Deploy APT Repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION#v}"
          DEB_FILE="$(pwd)/${{ steps.deb.outputs.deb_file }}"
          DEB_ARM64_FILE="$(pwd)/${{ steps.deb_arm64.outputs.deb_file }}"

          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY secret not set — skipping repo deploy"
            exit 0
          fi

          sudo apt-get install -y dpkg-dev apt-utils

          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(echo "$GPG_PRIVATE_KEY" | gpg --show-keys --with-colons 2>/dev/null \
            | grep '^sec:' | head -1 | cut -d: -f5)

          PAGES_DIR="/tmp/gh-pages-repo"
          rm -rf "$PAGES_DIR"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          if git ls-remote --heads "$REMOTE" gh-pages | grep -q gh-pages; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$PAGES_DIR"
          else
            mkdir -p "$PAGES_DIR" && cd "$PAGES_DIR"
            git init && git checkout -b gh-pages && git remote add origin "$REMOTE"
            cd -
          fi

          cp packaging/apt/install.sh "$PAGES_DIR/"
          cp packaging/rpm/install-rpm.sh "$PAGES_DIR/"
          cp packaging/apt/index.html "$PAGES_DIR/"
          gpg --armor --export "$GPG_KEY_ID" > "$PAGES_DIR/gpg-key.asc"
          touch "$PAGES_DIR/.nojekyll"

          if [ -f "$DEB_FILE" ]; then
            bash packaging/apt/update-apt-repo.sh "$DEB_FILE" "$PAGES_DIR" "$GPG_KEY_ID" amd64
          else
            echo "::warning::No amd64 .deb file — skipping APT amd64 update"
          fi
          if [ -f "$DEB_ARM64_FILE" ]; then
            bash packaging/apt/update-apt-repo.sh "$DEB_ARM64_FILE" "$PAGES_DIR" "$GPG_KEY_ID" arm64
          else
            echo "::warning::No arm64 .deb file — skipping APT arm64 update"
          fi

          cd "$PAGES_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Update APT repo: claude-cowork-service ${VERSION} (amd64 + arm64)"
            git push origin gh-pages
          }

      - name: Install Nix (for hash computation)
        uses: cachix/install-nix-action@v27

      - name: Update Nix package hash
        run: |
          VER="${RELEASE_VERSION#v}"
          URL="https://github.com/${{ github.repository }}/archive/${RELEASE_VERSION}.tar.gz"
          NAR_HASH=$(nix-prefetch-url --unpack --type sha256 "$URL" 2>/dev/null)
          NIX_HASH=$(nix hash to-sri --type sha256 "$NAR_HASH")

          sed -i -E "s|version = \"[^\"]+\"|version = \"$VER\"|" packaging/nix/package.nix
          sed -i -E "s|hash = \"sha256-[^\"]+\"|hash = \"$NIX_HASH\"|" packaging/nix/package.nix

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packaging/nix/package.nix
          git diff --staged --quiet || {
            git commit -m "Update Nix package hash for v${VER}"
            git pull --rebase origin main
            git push origin main
          }

  # ================================================================
  # RPM Repository — runs on Fedora for native rpm-sign support
  # ================================================================
  deploy-rpm-repo:
    needs: [prepare, release]
    if: needs.prepare.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    container: fedora:40
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Install RPM tooling
        run: dnf install -y rpm-sign createrepo_c gnupg2 git

      - name: Download RPM artifacts
        uses: actions/download-artifact@v4
        with:
          name: rpm-unsigned
          path: rpm-files/

      - name: Sign RPMs and deploy repository
        env:
          GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${RELEASE_VERSION#v}"

          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::warning::APT_GPG_PRIVATE_KEY secret not set — skipping RPM repo deploy"
            exit 0
          fi

          # Import GPG key
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID=$(echo "$GPG_PRIVATE_KEY" | gpg --show-keys --with-colons 2>/dev/null \
            | grep '^sec:' | head -1 | cut -d: -f5)
          gpg --armor --export "$GPG_KEY_ID" > /tmp/gpg-key.asc

          # Clone gh-pages (includes APT repo from previous job)
          PAGES_DIR="/tmp/gh-pages-repo"
          rm -rf "$PAGES_DIR"
          REMOTE="https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          if git ls-remote --heads "$REMOTE" gh-pages | grep -q gh-pages; then
            git clone --depth 1 --branch gh-pages "$REMOTE" "$PAGES_DIR"
          else
            mkdir -p "$PAGES_DIR" && cd "$PAGES_DIR"
            git init && git checkout -b gh-pages && git remote add origin "$REMOTE"
            cd -
          fi

          # Copy GPG public key (may have been updated)
          cp /tmp/gpg-key.asc "$PAGES_DIR/gpg-key.asc"

          # Sign and add each RPM to the repository
          for RPM_FILE in rpm-files/*.rpm; do
            [ -f "$RPM_FILE" ] || continue
            bash packaging/rpm/update-rpm-repo.sh "$RPM_FILE" "$PAGES_DIR" "$GPG_KEY_ID"
          done

          # Commit and push
          cd "$PAGES_DIR"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || {
            git commit -m "Update RPM repo: claude-cowork-service ${VERSION}"
            git push origin gh-pages
          }

  validate-nix:
    needs: [prepare, release]
    if: needs.prepare.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository (latest main with updated hash)
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Install Nix
        uses: cachix/install-nix-action@v27

      - name: Build with real fetchFromGitHub from release
        run: |
          echo "Validating Nix build using fetchFromGitHub from release..."
          echo "This simulates exactly what users run."
          nix build .#claude-cowork-service --no-link --print-build-logs --impure
          echo "Nix build validation passed — hash matches released tarball"

  aur:
    needs: [prepare, release]
    if: needs.prepare.outputs.do_release == 'true'
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Update PKGBUILD version + sha256
        run: |
          set -euo pipefail
          VER="${RELEASE_VERSION#v}"

          # Update pkgver/pkgrel
          sed -i -E "s/^pkgver=.*/pkgver=${VER}/" PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD

          # Compute sha256 of release tarball for this version
          URL="https://github.com/${{ github.repository }}/archive/${RELEASE_VERSION}.tar.gz"
          SHA="$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')"

          # Replace the first sha256sums entry (simple case: single source tarball)
          sed -i -E "s/^sha256sums=.*/sha256sums=('${SHA}')/" PKGBUILD

          echo "Updated PKGBUILD:"
          cat PKGBUILD

      - name: Generate .SRCINFO (in Arch container)
        run: |
          set -euo pipefail
          docker run --rm -v "$PWD":/pkg -w /pkg archlinux:base-devel bash -lc '
            pacman -Sy --noconfirm --needed git base-devel
            useradd -m builder
            chown -R builder:builder /pkg
            su builder -c "makepkg --printsrcinfo" > .SRCINFO
          '
          echo ".SRCINFO:"
          cat .SRCINFO

      - name: Fix workspace permissions after Docker
        run: sudo chown -R $(id -u):$(id -g) .

      - name: Setup SSH for AUR
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AUR_SSH_KEY }}" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

          printf '%s\n' \
            "Host aur.archlinux.org" \
            "  User aur" \
            "  IdentityFile ~/.ssh/aur" \
            "  StrictHostKeyChecking no" \
            >> ~/.ssh/config

          # Verify key is valid
          ssh-keygen -y -f ~/.ssh/aur > /dev/null 2>&1 || { echo "::error::AUR_SSH_KEY secret is not a valid private key"; exit 1; }

      - name: Push to AUR
        run: |
          VER="${RELEASE_VERSION#v}"
          git config --global user.name "${{ secrets.AUR_USERNAME }}"
          git config --global user.email "${{ secrets.AUR_EMAIL }}"

          git clone ssh://aur@aur.archlinux.org/claude-cowork-service.git aur-repo

          cp PKGBUILD .SRCINFO claude-cowork-service.install aur-repo/

          cd aur-repo
          git add PKGBUILD .SRCINFO claude-cowork-service.install
          git diff --staged --quiet || {
            git commit -m "Update to version ${VER}"
            git push origin master
            echo "Successfully pushed to AUR"
          }
